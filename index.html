<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode</title>
</head>
<body>
    <h1>Welcome to My Page</h1>
    <p id="test">This is a basic HTML page with a button.</p>

    <button id="hey">Click Me</button>
</body>
<script>
const paragraph=document.getElementById("test");
console.log(paragraph);
paragraph.innerText="Bla Bla Bla";
paragraph.style.color="Blue";
const b=document.querySelector("body")
console.log(paragraph.innerText);
const but=document.getElementById("hey");
but.addEventListener("click", function(){
but.innerText="Please wait......";
but.disabled=true;
paragraph.style.color="Green";
but.style.color="red";
b.style.backgroundColor="black";
})

</script>
</html>
